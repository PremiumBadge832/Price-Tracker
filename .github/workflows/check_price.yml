name: Check Product Prices

on:
  schedule:
    # Runs at the top of every hour (UTC)
    - cron: "0 * * * *"
  workflow_dispatch: {}   # lets you trigger it manually from the Actions tab

permissions:
  contents: write   # needed so the workflow can commit updated price history

jobs:
  check-prices:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run price tracker
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
        run: python tracker.py

      - name: Commit updated price history
        run: |
          git config user.name "price-tracker-bot"
          git config user.email "actions@github.com"
          git add data/price_history.json
          git diff --staged --quiet || git commit -m "Update price history [skip ci]"
          git push
